server:
  port: 8000

spring:
  application:
    name: mytool

  # SQLite 数据源配置
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:${user.home}/.openclaw/workspace-main/data/notes.db
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Jackson JSON 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  # Quartz 定时任务配置
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: MytoolScheduler
            instanceId: AUTO
          jobStore:
            class: org.quartz.impl.jdbcjobstore.JobStoreTX
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            tablePrefix: QRTZ_
            isClustered: true
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.upchr.mytool.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# Sa-Token 配置
sa-token:
  # Token 名称
  token-name: Authorization
  # Token 有效期（秒），默认 7 天
  timeout: 604800
  # Token 最低活跃频率（秒），默认 2 小时
  active-timeout: 7200
  # 是否允许同一账号多地同时登录
  is-concurrent: true
  # 多人登录同一账号时，是否共用一个 Token
  is-share: false
  # Token 风格
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  # JWT 密钥
  jwt-secret-key: mytool-jwt-secret-key-2024

# 线程池配置
thread-pool:
  core-size: 4
  max-size: 16
  queue-capacity: 100
  keep-alive-seconds: 60
  thread-name-prefix: mytool-async-

# Knife4j API 文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    com.upchr.mytool: debug
    org.quartz: info
