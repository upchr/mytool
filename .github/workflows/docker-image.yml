name: Build and Push Multi-Arch Image to Aliyun ACR and Docker Hub

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  # 阿里云 ACR(registry.cn-beijing.aliyuncs.com/base-chr/toolsplus:latest)
  ACR_REGISTRY: registry.cn-beijing.aliyuncs.com
  ACR_REPO: base-chr/toolsplus
  # Docker Hub（chrplus/toolsplus:latest）
  DOCKERHUB_USERNAME: chrplus
  DOCKERHUB_REPO: toolsplus
  TAG: ${{ github.ref_name }}
  BARK_URL: "https://api.day.app/${{ secrets.BARK_TOKEN }}/toolsplus/docker push  "  # 修改为你的 Bark 推送 URL


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 关键：启用 QEMU（支持 arm64）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. 登录阿里云 ACR
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      # 2. 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. 构建并推送多平台镜像到两个仓库
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.TAG }}
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPO }}:${{ env.TAG }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPO }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:${{ env.TAG }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO }}:latest

      # ====== Bark 通知 ======
      - name: Send Bark notification (success)
        if: success()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d '{
              "msg_type": "interactive",
              "card": {
                "type":"template",
                "data": {
                  "template_id":"AAqKyUKd4t2t1",
                  "template_version_name":"1.1.1",
                  "template_variable": {
                    "status":"成功",
                    "status_color":"green",
                    "step":"流程一",
                    "description":"Docker 构建成功\nTag: ${{ env.TAG }}",
                    "log_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              }
            }'

      - name: Send Bark notification (failure)
        if: failure()
        run: |
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d '{
              "msg_type": "interactive",
              "card": {
                "type":"template",
                "data": {
                  "template_id":"AAqKyUKd4t2t1",
                  "template_version_name":"1.1.1",
                  "template_variable": {
                    "status":"失败",
                    "status_color":"red",
                    "step":"流程一",
                    "description":"Docker 构建失败\nTag: ${{ env.TAG }}",
                    "log_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              }
            }'
